syntax = "proto3";

import "google/protobuf/empty.proto";

option csharp_namespace = "UserReportContracts";

package user_report;

service UserReportService {
  rpc GeneratePDFs (GeneratePdfRequest) returns (stream GeneratePdfResponse);
  rpc CancelReport (google.protobuf.Empty) returns (GeneratePdfResponse);
}

message UserMessage {
  string username = 1;
}

message FlightImageMessage {
  string file_name = 1;
  bytes content = 2;
}

message TicketMessage {
  string id = 1;
  string buyer_username = 2;
  string price_at_purchase = 3;
  bool is_canceled = 4;
}

message FlightMessage {
  string code = 1;
  string origin = 2;
  string destination = 3;
  string owner_username = 4;
  string date = 5;
  int32 seats = 6;
  int32 available_seats = 7;
  string price = 8;
  string duration = 9;
  bool is_cancelled = 10;
  repeated string passenger_usernames = 11;
  repeated TicketMessage tickets = 12;
  FlightImageMessage image = 13;
}

message GeneratePdfRequest {
  repeated UserMessage users = 1;
  repeated FlightMessage flights = 2;
}

message GeneratePdfResponse {
  string message = 1;
}
